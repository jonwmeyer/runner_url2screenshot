runner:
  name: URL Screenshot
  description: Captures a website screenshot
  version: 0.0.1

build:
  memorysize: 2560
  commands: |
    echo "START: Building scrapfly capture"
    apt update
    apt install -y python3
    apt install -y python3-pip
    apt install -y python-is-python3
    apt install -y ca-certificates
    apt install -y build-essential
    apt install -y git
    apt install -y curl
    wget https://go.dev/dl/go1.24.4.linux-amd64.tar.gz && tar -C /usr/local -xzf go1.24.4.linux-amd64.tar.gz && rm go1.24.4.linux-amd64.tar.gz
    ENV GOROOT=/usr/local/go
    ENV GOPATH=/go
    ENV PATH=$GOPATH/bin:$GOROOT/bin:$PATH
    ENV GO111MODULE=on
    ENV CGO_ENABLED=1
    ENV SCRAPFLY_API_KEY="scp-live-e18aaf826f8b42ab9fda7d17f0f3fd6c"
    ENV TMP_DIR=/tmp/runner/*/outputs
    mkdir -p /go/src
    mkdir -p /go/bin

webform:
  - name: url_1
    prompt: URL
    type: text

launch:
  type: binary
  command: /usr/bin/curl -G
    --request "GET"
    --url https://api.scrapfly.io/screenshot
    --data-urlencode "key=$SCRAPFLY_API_KEY"
    --data-urlencode "url=${url_1}" -o $HOME/screenshot.jpg