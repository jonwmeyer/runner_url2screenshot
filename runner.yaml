runner:
  name: URL Screenshot
  description: Captures a website screenshot
  version: 0.0.1

build:
  memorysize: 1280
  commands: |
    echo "START: Building scrapfly capture"
    apt update
    apt install -y python3
    apt install -y python3-pip
    apt install -y python-is-python3
    apt install -y ca-certificates
    apt install -y build-essential
    apt install -y git
    apt install -y curl

webform:
  - name: target
    prompt: URL
    type: text

launch:
  type: binary
  command: echo "/usr/bin/curl https://api.scrapfly.io/screenshot?url=${target}&key=$SCRAPFLY_API_KEY"